services:
  vibefolio-app:
    image: vibefolio-app:latest
    container_name: vibefolio-app
    pull_policy: never
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4130:3000"
    environment:
      - HOSTNAME=0.0.0.0
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/').then(r=>{process.exit(r.status<500?0:1)}).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - npm_default

networks:
  npm_default:
    external: true
